<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Majora's Field - Interactive Art Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #sketch-container { width: 100%; height: 100%; }
    #sketch-container canvas { display: block; }
    .back-link {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.85);
      padding: 8px 16px;
      border-radius: 4px;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }
    .back-link:hover { background: rgba(255, 255, 255, 1); }
  </style>
</head>
<body>
  <a class="back-link" href="/gallery/">Back to Gallery</a>
  <div id="sketch-container"></div>
  <script type="module" src="./sketch.js"></script>
</body>
</html>
